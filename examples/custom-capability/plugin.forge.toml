forge_manifest_version = "1.0"

[plugin]
name = "greeter"
version = "0.1.0"
description = "Demonstrates custom JSON schema input/output"
protocol_version = "1.0"

[transport]
shape = "server"
address = "http://127.0.0.1:50062"

[lifecycle]
restart_policy = "on-failure"

[capabilities]
provides = ["forge.example.greet@1.0"]
