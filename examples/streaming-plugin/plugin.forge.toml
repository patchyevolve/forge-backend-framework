forge_manifest_version = "1.0"

[plugin]
name = "streaming"
version = "0.1.0"
description = "Demonstrates paginated / cursor-based data access"
protocol_version = "1.0"

[transport]
shape = "server"
address = "http://127.0.0.1:50061"

[lifecycle]
restart_policy = "on-failure"

[capabilities]
provides = ["forge.example.stream@1.0"]
