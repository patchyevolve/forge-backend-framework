name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run tests
        run: cargo test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: release
            flags: --release -p forge-cli
          - name: no-default-features
            flags: -p forge-core --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build (${{ matrix.target.name }})
        run: cargo build ${{ matrix.target.flags }}

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Package forge-proto
        run: cargo package -p forge-proto
      - name: Package forge-plugin-sdk-rust
        run: cargo package -p forge-plugin-sdk-rust
      - name: Package forge-core
        run: cargo package -p forge-core

  offline-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache dependencies
        run: cargo fetch
      - name: Offline build
        run: cargo build --offline

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build all binaries
        run: cargo build
      - name: Committed backend test
        run: bash test_committed_backend.sh
      - name: Offline build proof
        run: bash test_offline_build.sh
