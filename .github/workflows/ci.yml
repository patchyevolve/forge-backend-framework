name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: release
            flags: --release -p forge-cli
          - name: no-default-features
            flags: -p forge-backend --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build ${{ matrix.target.flags }}

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo package -p forge-proto
      - run: cargo package -p forge-plugin-sdk-rust
      - run: cargo package -p forge-backend

  offline-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fetch
      - run: cargo build --offline

  round-trip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p forge-plugin-echo-rs -p forge-cli --release
      - run: bash test_round_trip.sh

  round-trip-committed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p forge-plugin-echo-rs -p forge-cli --release
      - run: bash test_committed_round_trip.sh

  integration-committed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p forge-plugin-echo-rs -p forge-plugin-auth-jwt -p forge-plugin-data-sqlite -p forge-plugin-http-router -p forge-cli --release
      - run: bash test_committed_backend.sh

  integration-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p forge-plugin-echo-rs -p forge-plugin-auth-jwt -p forge-plugin-data-sqlite -p forge-plugin-http-router -p forge-cli --release
      - run: bash test_example_backend.sh

  kill-resilience:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p forge-plugin-echo-rs -p forge-plugin-auth-jwt -p forge-plugin-data-sqlite -p forge-plugin-http-router -p forge-cli --release
      - run: bash test_kill_resilience.sh

  tutorial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p tutorial-ingest -p tutorial-process -p tutorial-store -p tutorial-count -p forge-cli --release
      - run: bash test_tutorial.sh
