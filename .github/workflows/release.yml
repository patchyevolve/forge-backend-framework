name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: ${{ contains(matrix.target, 'linux') && 'ubuntu-latest' || 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl-tools
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release -p forge-cli --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/forge dist/
          tar czf forge-${{ matrix.target }}.tar.gz -C dist forge
          if command -v sha256sum; then
            sha256sum forge-${{ matrix.target }}.tar.gz > forge-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 forge-${{ matrix.target }}.tar.gz > forge-${{ matrix.target }}.tar.gz.sha256
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.target }}
          path: forge-${{ matrix.target }}.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: forge-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} install.sh *.tar.gz *.sha256 \
            --title "${{ github.ref_name }}" \
            --notes "See https://crates.io/crates/forgecore-backend-framework-daemon/${{ github.ref_name }} for changelog"
